<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EdChange</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <a href="#">ED<span>CHANGE</span></a>
            </div>
            <h2>Welcome Back</h2>
            <p>Log in to connect with your circles.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@school.edu" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="login-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-submit-btn">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="#">Request Access</a></p>
            </div>
        </div>
    </div>

 <script src="script.js"></script>
</body>
</html>
