<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdChange | Educator Network</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">ED<span>CHANGE</span></a>
            </div>
            
            <nav class="nav-menu">
                <ul class="nav_links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="groups.html">Circles</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="Search educators...">
                </div>
                <button class="login-btn" ><a href="login.html">Login</a></button>
            </div>
        </div>
    </header>

    <main class="feed-layout">
        
        <aside class="sidebar-left">
            <div class="mini-profile">
                <img src="css/images/icon.png" alt="Profile" class="avatar-md">
                <h3>Eric Price</h3>
                <p>Principal • UT</p>
                <hr>
                <div class="stats">
                    <span>Connections: <strong>142</strong></span>
                    <span>Posts: <strong>12</strong></span>
                </div>
            </div>
        </aside>

        <section class="feed-content">
            
            <div class="create-post">
                <div class="post-input-row">
                    <img src="css/images/icon.png" alt="Me" class="avatar-sm">
                    <div class="comment-placeholder" contenteditable="true">What problem are you trying to solve today?</div>
                </div>
                <div class="post-actions">
                    <button class="btn-action">📸 Photo</button>
                    <button class="btn-action">🎨 Circle</button>
                    <button class="btn-primary" id="submitPost">Post</button>
                </div>
            </div>

            <div id="postsContainer">
                <div class="loading-state">Loading your feed...</div>
            </div>

        </section>

        <aside class="sidebar-right">
            <div class="widget">
                <h4>Suggested Circles</h4>
                <div class="suggested-item">
                    <span>Utah Educators</span>
                    <button class="join-btn small">Join</button>
                </div>
                <div class="suggested-item">
                    <span>STEM Lab</span>
                    <button class="join-btn small">Join</button>
                </div>
                <div class="suggested-item">
                    <span>History 8th</span>
                    <button class="join-btn small">Join</button>
                </div>
            </div>
        </aside>

    </main>

    <script src="index.js"></script>
</body>
</html>
